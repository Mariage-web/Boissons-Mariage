<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar — Mariage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #110a1a;
    --surface: #1c1228;
    --border: #2e1f45;
    --accent: #c084fc;
    --accent2: #7c3aed;
    --text: #f3eeff;
    --muted: #7a6a94;
    --success: #4ade80;
    --card-bg: #1a1128;
  }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  nav button { flex: 1; padding: 16px; background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .page { display: none; padding: 28px 20px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }
  .bar-title { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), #e879f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .bar-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input[type=text], input[type=password] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 24px; transition: border-color 0.15s; }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--accent2); }
  .drinks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .drink-card { background: var(--card-bg); border: 2px solid var(--border); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all 0.15s; text-align: center; user-select: none; }
  .drink-card:hover { border-color: var(--accent2); }
  .drink-card.selected { border-color: var(--accent); background: #2a1545; }
  .drink-emoji { font-size: 32px; margin-bottom: 8px; }
  .drink-name { font-size: 14px; font-weight: 600; color: var(--text); }
  button.submit { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent2), #9333ea); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  button.submit:hover { opacity: 0.88; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--success); color: #000; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 700; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 99; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* PIN */
  .pin-screen { text-align: center; padding: 40px 20px; }
  .pin-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), #e879f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .pin-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .pin-input { text-align: center; font-size: 28px; letter-spacing: 0.3em; width: 160px; margin: 0 auto 20px; }
  .pin-error { color: #e05555; font-size: 13px; margin-bottom: 12px; display: none; }

  /* LIST */
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .list-title { font-size: 20px; font-weight: 800; }
  .count-badge { background: var(--accent2); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .order-item { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .order-emoji { font-size: 24px; }
  .order-name { font-size: 15px; font-weight: 600; flex: 1; }
  .order-drink { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .order-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
  .clear-btn { margin-top: 20px; padding: 10px 20px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .clear-btn:hover { border-color: #e05555; color: #e05555; }
  .loading { text-align: center; color: var(--muted); padding: 20px; font-size: 14px; }

  /* QR */
  .qr-section { text-align: center; padding-top: 12px; }
  .qr-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .qr-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  #qr-box { background: #fff; padding: 16px; border-radius: 16px; display: inline-block; margin-bottom: 20px; }
  .qr-url { font-size: 11px; color: var(--muted); word-break: break-all; margin-bottom: 20px; padding: 0 12px; }
  .dl-btn { padding: 12px 28px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .dl-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<nav>
  <button class="active" id="nav-order" onclick="showPage('order', this)">🍹 Commander</button>
  <button id="nav-list" onclick="goToList(this)">📋 Commandes</button>
  <button id="nav-qr" onclick="showPage('qr', this)">QR Code</button>
</nav>

<!-- ORDER PAGE -->
<div class="page active" id="page-order">
  <div class="bar-title">Que bois-tu ?</div>
  <p class="bar-sub">Entre ton prénom et choisis ta boisson.</p>
  <label for="name-input">Ton prénom</label>
  <input type="text" id="name-input" placeholder="Ex : Alex">
  <label>Ta boisson</label>
  <div class="drinks-grid">
    <div class="drink-card" onclick="selectDrink(this, 'Bière')"><div class="drink-emoji">🍺</div><div class="drink-name">Bière</div></div>
    <div class="drink-card" onclick="selectDrink(this, 'Cocktail')"><div class="drink-emoji">🍸</div><div class="drink-name">Cocktail</div></div>
    <div class="drink-card" onclick="selectDrink(this, 'Champagne')"><div class="drink-emoji">🥂</div><div class="drink-name">Champagne</div></div>
    <div class="drink-card" onclick="selectDrink(this, 'Vin rouge')"><div class="drink-emoji">🍷</div><div class="drink-name">Vin rouge</div></div>
  </div>
  <button class="submit" onclick="submitOrder()">Envoyer ma commande</button>
</div>

<!-- PIN PAGE -->
<div class="page" id="page-pin">
  <div class="pin-screen">
    <div class="pin-title">🔒 Accès réservé</div>
    <p class="pin-sub">Entre le code PIN pour voir toutes les commandes.</p>
    <label for="pin-input">Code PIN</label>
    <input type="password" id="pin-input" class="pin-input" maxlength="4" placeholder="••••" oninput="checkPin()">
    <p class="pin-error" id="pin-error">Code incorrect, réessaie.</p>
  </div>
</div>

<!-- LIST PAGE -->
<div class="page" id="page-list">
  <div class="list-header">
    <div class="list-title">Commandes</div>
    <span class="count-badge" id="count">0</span>
  </div>
  <div id="orders-list"><div class="loading">Chargement...</div></div>
  <button class="clear-btn" onclick="clearOrders()">Tout effacer</button>
</div>

<!-- QR PAGE -->
<div class="page" id="page-qr">
  <div class="qr-section">
    <div class="qr-title">QR Code</div>
    <p class="qr-sub">Scanne pour accéder à la commande.</p>
    <div id="qr-box"></div>
    <p class="qr-url" id="qr-url-text"></p>
    <button class="dl-btn" onclick="downloadQR()">⬇ Télécharger PNG</button>
  </div>
</div>

<div class="toast" id="toast">✓ Commande envoyée !</div>

<script>
  const DB_URL = 'https://boissons-mariage-default-rtdb.europe-west1.firebasedatabase.app';
  const PIN = '2026';
  const drinkEmojis = { 'Bière': '🍺', 'Cocktail': '🍸', 'Champagne': '🥂', 'Vin rouge': '🍷' };
  let selectedDrink = null;
  let pinVerified = false;

  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
  }

  function goToList(btn) {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (pinVerified) {
      showPage('list', btn);
      loadOrders();
    } else {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-pin').classList.add('active');
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-error').style.display = 'none';
    }
  }

  function checkPin() {
    const val = document.getElementById('pin-input').value;
    if (val.length === 4) {
      if (val === PIN) {
        pinVerified = true;
        showPage('list', document.getElementById('nav-list'));
        loadOrders();
      } else {
        document.getElementById('pin-error').style.display = 'block';
        document.getElementById('pin-input').value = '';
      }
    }
  }

  function selectDrink(el, name) {
    document.querySelectorAll('.drink-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedDrink = name;
  }

  async function submitOrder() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { alert('Entre ton prénom !'); return; }
    if (!selectedDrink) { alert('Choisis une boisson !'); return; }
    const now = new Date();
    const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
    const order = { name, drink: selectedDrink, time };
    try {
      await fetch(DB_URL + '/commandes.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      document.getElementById('name-input').value = '';
      document.querySelectorAll('.drink-card').forEach(c => c.classList.remove('selected'));
      selectedDrink = null;
      showToast();
    } catch(e) {
      alert('Erreur réseau, réessaie.');
    }
  }

  async function loadOrders() {
    const list = document.getElementById('orders-list');
    list.innerHTML = '<div class="loading">Chargement...</div>';
    try {
      const res = await fetch(DB_URL + '/commandes.json');
      const data = await res.json();
      if (!data) {
        document.getElementById('count').textContent = '0';
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">🍹</div><div class="empty-text">Aucune commande pour l\'instant.</div></div>';
        return;
      }
      const orders = Object.values(data).reverse();
      document.getElementById('count').textContent = orders.length;
      list.innerHTML = orders.map(o => `
        <div class="order-item">
          <div class="order-emoji">${drinkEmojis[o.drink] || '🥤'}</div>
          <div>
            <div class="order-name">${o.name}</div>
            <div class="order-drink">${o.drink}</div>
            <div class="order-time">${o.time}</div>
          </div>
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur de connexion.</div></div>';
    }
  }

  async function clearOrders() {
    if (confirm('Effacer toutes les commandes ?')) {
      await fetch(DB_URL + '/commandes.json', { method: 'DELETE' });
      loadOrders();
    }
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function renderQR() {
    const box = document.getElementById('qr-box');
    if (box.innerHTML) return;
    const url = 'https://mariage-web.github.io/Boissons-Mariage/';
    document.getElementById('qr-url-text').textContent = url;
    new QRCode(box, { text: url, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.H });
  }

  function downloadQR() {
    const img = document.querySelector('#qr-box img');
    if (!img) return;
    const a = document.createElement('a');
    a.href = img.src;
    a.download = 'bar-qrcode.png';
    a.click();
  }

  document.getElementById('nav-qr').addEventListener('click', renderQR);
</script>
</body>
</html>
